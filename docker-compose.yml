services:
  moderation-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: moderation-gateway
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=2).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
